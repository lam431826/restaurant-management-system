# ============================================================
# Local development overrides
# Active with: spring.profiles.active=local
# ============================================================

# DataSource
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=rms_db;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:}

# JPA — show SQL in local
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging — verbose in local
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.flywaydb=DEBUG

# Flyway — disable checksum validation locally (migration files may be edited during dev)
spring.flyway.validate-on-migrate=false

# JWT — short-lived for testing
app.jwt.secret=local-dev-secret-key-must-be-at-least-32-chars-long
app.jwt.access-token-expiration=86400000

# CORS — cho phép mọi port localhost (Vite tự tăng port nếu 5173 bận)
app.cors.allowed-origins=http://localhost:*

# Mail — dùng Gmail thật (đọc từ .env: MAIL_HOST, MAIL_USERNAME, MAIL_PASSWORD)
# Bỏ comment dưới đây nếu muốn dùng MailHog (cần MailHog chạy trên port 1025):
# spring.mail.host=localhost
# spring.mail.port=1025
# spring.mail.username=
# spring.mail.password=
# spring.mail.properties.mail.smtp.auth=false
# spring.mail.properties.mail.smtp.starttls.enable=false
