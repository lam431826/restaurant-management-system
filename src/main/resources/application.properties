# ============================================================
# Application
# ============================================================
spring.application.name=rms-backend
server.port=8081
server.servlet.context-path=/

# ============================================================
# DataSource (SQL Server)
# ============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=rms_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# JPA
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================================
# JWT
# ============================================================
app.jwt.secret=${JWT_SECRET:change-this-to-a-very-long-random-secret-key-256bit}
app.jwt.access-token-expiration=28800000
app.jwt.refresh-token-expiration=604800000

# ============================================================
# Mail
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.sendgrid.net}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:apikey}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Integration
# ============================================================
app.integration.messaging-provider=${MESSAGING_PROVIDER:sendgrid}
app.integration.payment-provider=${PAYMENT_PROVIDER:vnpay}
app.integration.sendgrid-api-key=${SENDGRID_API_KEY:}
app.integration.twilio-account-sid=${TWILIO_ACCOUNT_SID:}
app.integration.twilio-auth-token=${TWILIO_AUTH_TOKEN:}
app.integration.vnpay-tmn-code=${VNPAY_TMN_CODE:}
app.integration.vnpay-hash-secret=${VNPAY_HASH_SECRET:}

# ============================================================
# Logging
# ============================================================
logging.level.root=INFO
logging.level.com.rms.restaurant=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Springdoc / Swagger
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
